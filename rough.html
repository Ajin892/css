<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Child Selector</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    margin:0;
}

.navbar{
    background:#0d6efd;
    color:white;
    padding:18px;
}

.content{
    width:70%;
    margin:auto;
    background:white;
    padding:20px;
    margin-top:30px;
}

/* Child Selector */
.content > h2{
    color:blue;
}

.box h2{
    color:black;
}

.icon{
    font-size:45px;
}

</style>

</head>

<body>

<div class="navbar">
    🌐 My Website
</div>

<div class="content">

<h2>Main Heading (Blue)</h2>

<p>Welcome to our website.</p>

<div class="box">

<h2>Heading inside Box (Black)</h2>

<p>This heading is not a direct child of .content.</p>

<div class="icon">📱</div>

</div>

</div>

</body>
</html>
