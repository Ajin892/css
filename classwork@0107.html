<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .product {
            text-align: center;
            margin:auto;
            border: 1px solid #000000;
            padding: 20px;
            width: 900px;
            border-radius: 20px 0px 30px 0px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
         @media only screen and (max-width: 600px) {
  .product {
            text-align: center;
            font-size: 9px;
            margin: auto;
            width: 300px;
            border: 1px solid #000000;
            padding: 20px;
            border-radius: 20px 0px 30px 0px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
           
  }}
  @media only screen and (orientation: landscape) {
  body {
    background-color: rgb(0, 191, 255);
  }}
        </style>
</head>
<body>
    <div class="product">
        <img src="https://images.unsplash.com/photo-1641048930621-ab5d225ae5b0?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fGhlYWRwaG9uZXN8ZW58MHx8MHx8fDA%3D" alt="headphones" style="width: 250px; height: auto; border-radius: 20px 0px 30px 0px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);">
        <h3>Headphone</h3>

        <p style="background-color: #ff0000; color: white; padding: 10px; border-radius: 5px; cursor: pointer;">BUY NOW</p>

    </div>
   
</body>
</html>
